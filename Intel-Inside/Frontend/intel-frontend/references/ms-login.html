<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in to your account</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      background: #060d1a;
      color: #1b1b1b;
    }

    /* ── ANIMATED NETWORK BACKGROUND ── */
    #bg-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* ── TOP-LEFT INTEL BRANDING ── */
    .top-header {
      position: fixed;
      top: 32px;
      left: 44px;
      display: flex;
      align-items: center;
      gap: 16px;
      z-index: 10;
    }

    .top-header img.intel-logo {
      height: 28px;
      width: auto;
      /* The black logo on dark bg — apply brightness to make it show as light */
      filter: brightness(0) invert(0.75);
    }

    .top-header .brand-text {
      border-left: 1px solid rgba(255,255,255,0.25);
      padding-left: 16px;
    }

    .top-header .brand-title {
      font-size: 15px;
      font-weight: 600;
      color: #c8d0dc;
      line-height: 1.3;
    }

    .top-header .brand-subtitle {
      font-size: 11px;
      color: #7a8a9e;
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 1px;
    }

    .top-header .brand-subtitle .cloud-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    /* ── CENTERED CARD STACK ── */
    .main-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* ── LOGIN BOX ── */
    .login-box {
      background: #ffffff;
      box-shadow: 0 2px 18px rgba(0,0,0,0.35);
    }

    .login-content {
      padding: 44px 44px 28px;
    }

    /* Inner branding */
    .inner-logo { margin-bottom: 22px; }

    .inner-logo-title {
      font-size: 20px;
      font-weight: 600;
      color: #0067b8;
      margin-bottom: 4px;
    }

    .inner-logo-subtitle {
      font-size: 12px;
      color: #555;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .inner-logo-subtitle .cloud-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .inner-logo-subtitle strong {
      font-weight: 600;
      color: #333;
    }

    h1 {
      font-size: 24px;
      font-weight: 400;
      color: #1b1b1b;
      margin: 0 0 24px;
    }

    /* Email input */
    .input-group { margin-bottom: 6px; }

    input[type="email"] {
      width: 100%;
      padding: 8px 0;
      font-size: 15px;
      border: none;
      border-bottom: 1px solid #666;
      outline: none;
      font-family: inherit;
      background: transparent;
      color: #1b1b1b;
    }
    input[type="email"]::placeholder { color: #666; }
    input[type="email"]:focus { border-bottom: 2px solid #0067b8; }

    .help-link {
      font-size: 13px;
      color: #0067b8;
      text-decoration: none;
      display: inline-block;
      margin: 14px 0 36px;
    }
    .help-link:hover { text-decoration: underline; }

    /* Buttons */
    .button-group {
      display: flex;
      justify-content: flex-end;
      gap: 6px;
    }

    button {
      padding: 8px 0;
      font-size: 15px;
      border: none;
      cursor: pointer;
      font-family: inherit;
      min-width: 108px;
    }

    .btn-back {
      background-color: #d6d6d6;
      color: #000;
    }
    .btn-back:hover { background-color: #c4c4c4; }

    .btn-next {
      background-color: #0067b8;
      color: #fff;
    }
    .btn-next:hover { background-color: #005da6; }

    /* Login box footer */
    .login-footer {
      background-color: #f2f2f2;
      padding: 16px 44px;
      font-size: 15px;
      border-top: 1px solid #e8e8e8;
    }
    .login-footer a {
      color: #0067b8;
      text-decoration: none;
    }
    .login-footer a:hover { text-decoration: underline; }

    /* ── SIGN-IN OPTIONS BOX ── */
    .options-box {
      background: #ffffff;
      box-shadow: 0 2px 18px rgba(0,0,0,0.28);
      padding: 16px 44px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      margin-top: 12px;
      transition: background 0.15s;
    }
    .options-box:hover { background: #fafafa; }

    .options-icon {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
    }

    .options-text {
      font-size: 15px;
      color: #1b1b1b;
    }

    /* ── BOTTOM LINKS ── */
    .bottom-links {
      position: fixed;
      bottom: 16px;
      right: 28px;
      font-size: 12px;
      z-index: 10;
      display: flex;
      gap: 24px;
    }
    .bottom-links a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
    }
    .bottom-links a:hover {
      text-decoration: underline;
      color: #fff;
    }

    @media (max-width: 500px) {
      .top-header { display: none; }
      .main-container { max-width: 100%; padding: 0 16px; }
    }
  </style>
</head>
<body>

<!-- Network mesh background -->
<canvas id="bg-canvas"></canvas>

<!-- Top-left Intel branding -->
<div class="top-header">
  <img class="intel-logo"
       src="https://b2928487.smushcdn.com/2928487/wp-content/uploads/2022/10/Intel-logo.png?lossy=1&strip=1&webp=1"
       alt="Intel" />
  <div class="brand-text">
    <span class="brand-title">Intel Azure Portal</span>
      <span class="brand-subtitle">
      <img class="cloud-icon" src="https://www.svgrepo.com/show/452065/ms-onedrive.svg" alt="cloud" /> Cloud Services - Production
    </span>
  </div>
</div>

<!-- Centered login card stack -->
<div class="main-container">

  <div class="login-box">
    <div class="login-content">

      <div class="inner-logo">
        <div class="inner-logo-title">Intel Azure Portal</div>
        <div class="inner-logo-subtitle">
          <img class="cloud-icon" src="https://www.svgrepo.com/show/452065/ms-onedrive.svg" alt="cloud" />
          Cloud Services &mdash; <strong>Production</strong>
        </div>
      </div>

      <h1>Sign in</h1>

      <div class="input-group">
        <input type="email" placeholder="Enter your email address" aria-label="Enter your email address" />
      </div>

      <a href="#" class="help-link">Can't access your account?</a>

      <div class="button-group">
        <button type="button" class="btn-back">Back</button>
        <button type="button" class="btn-next">Next</button>
      </div>
    </div>

    <div class="login-footer">
      <a href="#">Sign-In Help</a>
    </div>
  </div>

  <div class="options-box">
    <img class="options-icon" src="https://aadcdn.msauth.net/shared/1.0/content/images/signin-options_3e3f6b73c3f310c31d2c4d131a8ab8c6.svg" alt="sign-in options" />
    <span class="options-text">Sign-in options</span>
  </div>

</div>

<!-- Bottom right links -->
<div class="bottom-links">
  <a href="#">Terms of use</a>
  <a href="#">Privacy &amp; cookies</a>
  <a href="#">···</a>
</div>

<script>
  // Animated network mesh canvas background
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');

  let W, H, nodes, animId;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function createNodes(count) {
    return Array.from({ length: count }, () => ({
      x: Math.random() * W,
      y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.4,
      vy: (Math.random() - 0.5) * 0.4,
      r: Math.random() * 1.8 + 0.8
    }));
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // Layered dark gradient background
    const grad = ctx.createRadialGradient(W * 0.35, H * 0.45, 0, W * 0.5, H * 0.5, Math.max(W, H) * 0.75);
    grad.addColorStop(0, '#0e1e3a');
    grad.addColorStop(0.5, '#080f20');
    grad.addColorStop(1, '#03070f');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    const LINK_DIST = 160;

    // Draw edges
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const dx = nodes[i].x - nodes[j].x;
        const dy = nodes[i].y - nodes[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < LINK_DIST) {
          const alpha = (1 - dist / LINK_DIST) * 0.28;
          ctx.beginPath();
          ctx.moveTo(nodes[i].x, nodes[i].y);
          ctx.lineTo(nodes[j].x, nodes[j].y);
          ctx.strokeStyle = `rgba(80,160,255,${alpha})`;
          ctx.lineWidth = 0.6;
          ctx.stroke();
        }
      }
    }

    // Draw nodes
    for (const n of nodes) {
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(100,175,255,0.55)';
      ctx.fill();
    }
  }

  function update() {
    for (const n of nodes) {
      n.x += n.vx;
      n.y += n.vy;
      if (n.x < 0 || n.x > W) n.vx *= -1;
      if (n.y < 0 || n.y > H) n.vy *= -1;
    }
  }

  function loop() {
    update();
    draw();
    animId = requestAnimationFrame(loop);
  }

  window.addEventListener('resize', () => {
    resize();
    nodes = createNodes(90);
  });

  resize();
  nodes = createNodes(90);
  loop();
</script>
</body>
</html>
